<!DOCTYPE html>
<html>
<head>
<title>Future Booking System</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #000000);
  color: #00f7ff;
}

/* Header */
header {
  text-align: center;
  padding: 15px;
  background: black;
  border-bottom: 1px solid #00f7ff;
  text-shadow: 0 0 10px #00f7ff;
}

/* Layout */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

/* Form */
form {
  width: 320px;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  border: 1px solid #00f7ff;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

/* Inputs */
input, textarea {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  background: black;
  border: 1px solid #00f7ff;
  color: #00f7ff;
  border-radius: 6px;
  outline: none;
}

input::placeholder, textarea::placeholder {
  color: #66faff;
}

/* Button */
button {
  width: 100%;
  padding: 10px;
  background: linear-gradient(90deg,#00f7ff,#00c3ff);
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
}

/* Map */
.map {
  width: 320px;
  height: 350px;
  border: 1px solid #00f7ff;
  border-radius: 12px;
  overflow: hidden;
}

/* Output */
.info {
  margin-top: 10px;
  font-size: 14px;
  color: #00ffcc;
}
</style>

</head>

<body>

<header>
<h1>🚚 FUTURE BOOKING SYSTEM</h1>
</header>
  <nav class="navbar">
<a href="index.html">Home</a>
<a href="booking.html">Booking</a>
<a href="tracking.html">Tracking</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<!-- FORM -->
<form onsubmit="book(event)">

<input type="text" id="name" placeholder="Name" required>
<input type="text" id="phone" placeholder="Phone" required>

<input type="text" id="pickup" placeholder="Pickup Location" required>
<input type="text" id="drop" placeholder="Drop Location" required>

<textarea id="goods" placeholder="Goods Details"></textarea>

<!-- PRICE -->
<input type="number" id="distance" placeholder="Distance (KM)" oninput="calcPrice()" required>

<p class="info">💰 Estimated Price: ₹<span id="price">0</span></p>

<button type="submit">🚀 Confirm Booking</button>

<p class="info" id="bookingId"></p>

</form>

<!-- MAP -->
<div class="map">
<iframe
width="100%"
height="100%"
frameborder="0"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=Solapur&output=embed">
</iframe>
</div>

</div>

<script>

/* 💰 PRICE CALCULATOR */
function calcPrice() {
  let km = document.getElementById("distance").value;
  let price = km * 12 + 50; // base + per km
  document.getElementById("price").innerText = price || 0;
}

/* 📦 BOOKING SYSTEM */
function book(e) {
  e.preventDefault();

  // Booking ID generator
  let id = "FM" + Math.floor(Math.random() * 90000 + 10000);

  document.getElementById("bookingId").innerHTML =
    "📦 Booking ID: " + id + "<br>✅ Booking Confirmed!";
}
</script>

</body>
</html>
