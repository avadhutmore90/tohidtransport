<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1d2671, #c33764);
}

/* Header */
header {
  text-align: center;
  padding: 15px;
  color: white;
  background: linear-gradient(90deg, #ff6a00, #ee0979);
}

/* Navbar */
nav {
  display: flex;
  justify-content: center;
  background: #111;
}

nav a {
  color: white;
  padding: 12px 18px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  background: #ff6a00;
  transform: scale(1.1);
}

/* Section */
.section {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 80vh;
}

/* Contact Card */
.contact-card {
  padding: 30px;
  width: 320px;
  text-align: center;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  color: white;
  animation: fadeIn 1.5s ease;
}

/* Contact Items */
.contact-card p {
  font-size: 16px;
  margin: 15px 0;
  transition: 0.3s;
  cursor: pointer;
}

.contact-card p:hover {
  transform: scale(1.05);
  color: #00ffd5;
}

/* WhatsApp Button */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  font-size: 22px;
  padding: 12px;
  border-radius: 50%;
  text-decoration: none;
  animation: bounce 2s infinite;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes bounce {
  0%,100% { transform: translateY(0);}
  50% { transform: translateY(-8px);}
}
</style>

</head>

<body>
