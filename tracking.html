<!DOCTYPE html>
<html>
<head>
<title>Tracking</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  background: black;
  color: #00f7ff;
  text-shadow: 0 0 10px #00f7ff;
}

/* Navbar */
nav {
  display: flex;
  justify-content: center;
  background: #050505;
}

nav a {
  color: #00f7ff;
  padding: 12px 18px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  background: #00f7ff;
  color: black;
  box-shadow: 0 0 10px #00f7ff;
}

/* Section */
.section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 80vh;
}

/* Glass Box */
.tracking-box {
  padding: 30px;
  width: 320px;
  text-align: center;
  border-radius: 15px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 25px rgba(0,255,255,0.3);
  animation: fadeIn 1.5s ease;
}

/* Input */
input {
  width: 90%;
  padding: 10px;
  margin: 15px 0;
  border: none;
  outline: none;
  border-radius: 20px;
  background: black;
  color: #00f7ff;
  text-align: center;
  box-shadow: 0 0 10px #00f7ff inset;
}

/* Button */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 25px;
  background: #00f7ff;
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #00c3ff;
  box-shadow: 0 0 15px #00f7ff;
  transform: scale(1.1);
}

/* Result */
#result {
  margin-top: 20px;
  font-size: 16px;
  color: #00ffcc;
  text-shadow: 0 0 5px #00ffcc;
}

/* WhatsApp */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  font-size: 22px;
  padding: 12px;
  border-radius: 50%;
  text-decoration: none;
  animation: pulse 2s infinite;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7);}
  70% { box-shadow: 0 0 0 15px rgba(37,211,102,0);}
  100% { box-shadow: 0 0 0 0 rgba(37,211,102,0);}
}
</style>

<script>
function trackOrder() {
  let id = document.getElementById("trackId").value;
  let result = document.getElementById("result");

  if(id === "") {
    result.innerHTML = "⚠️ Please enter Tracking ID";
    return;
  }

  // Fake tracking simulation
  result.innerHTML = "📦 Checking...";

  setTimeout(() => {
    result.innerHTML = "🚚 Shipment is in transit... (Estimated delivery: Tomorrow)";
  }, 1500);
}
</script>

</head>

<body>

<header><h1>🚀 Track Shipment</h1></header>

<nav>
<a href="index.html">Home</a>
<a href="booking.html">Booking</a>
<a href="tracking.html">Tracking</a>
<a href="contact.html">Contact</a>
</nav>

<section class="section">

<div class="tracking-box">
<h2>Enter Tracking ID</h2>

<input type="text" id="trackId" placeholder="e.g. FM12345">
<br>

<button onclick="trackOrder()">Track Now</button>

<p id="result"></p>
</div>

</section>

<a class="whatsapp" href="https://wa.me/917972562319" target="_blank">💬</a>

</body>
</html>
